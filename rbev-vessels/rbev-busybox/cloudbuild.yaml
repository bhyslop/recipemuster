#
# Maximally-baked build definition for trigger-based builds (Tier 2).
# Committed to the main repo and referenced by a Cloud Build trigger
# via Developer Connect. The Foundry dispatches builds via triggers.run
# with substitution overrides for the 4 dynamic values below.
#
# All static values (GAR coordinates, image pins, vessel identity) are
# baked from rbrr.env at authoring time. When rbrr.env values change,
# this file must be updated to match.
#
# Baked values (source: rbrr.env):
#   GAR location:   us-central1 (RBRR_GCP_REGION)
#   GAR project:    rbwg-d-proto-251230080456 (RBRR_DEPOT_PROJECT_ID)
#   GAR repository: rbw-proto-repository (RBRR_GAR_REPOSITORY)
#   Vessel moniker: rbev-busybox
#   Platforms:      linux/amd64,linux/arm64,linux/arm/v7
#   Dockerfile:     rbev-vessels/rbev-busybox/Dockerfile
#
# Builder image pins (baked from RBRR_GCB_*_IMAGE_REF):
#   gcloud: gcr.io/cloud-builders/gcloud@sha256:54bcf51d...
#   docker: gcr.io/cloud-builders/docker@sha256:80e36415...
#   alpine: docker.io/library/alpine@sha256:59855d3d...
#   syft:   docker.io/anchore/syft@sha256:d0b19da0...
#   binfmt: docker.io/tonistiigi/binfmt@sha256:e25e3b94...

substitutions:
  # Dynamic values — overridden at triggers.run dispatch time
  # _RBGY_TAG_BASE carries BURD_NOW_STAMP from Foundry tabtarget dispatch
  _RBGY_TAG_BASE: ''
  _RBGY_GIT_COMMIT: ''
  _RBGY_GIT_BRANCH: ''
  _RBGY_GIT_REPO: ''

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: UNSPECIFIED

timeout: 1200s

steps:
  # Step 01: Get Docker access token from gcloud
  # Builder: gcloud (~Feb 2026)
  # Log hygiene: token written to file, never echoed
  - name: 'gcr.io/cloud-builders/gcloud@sha256:54bcf51d601ff370171bba523099424765c6f2aadabbc30bab2e2779978da6cd'
    id: get-docker-token
    entrypoint: /bin/bash
    args:
      - '-lc'
      - |
        set -euo pipefail
        set +x
        gcloud auth print-access-token > /workspace/.docker-token

  # Step 02: Docker login to Google Artifact Registry
  # Builder: docker (~Feb 2026)
  # Log hygiene: token piped via stdin, rm after use, set +x around sensitive ops
  - name: 'gcr.io/cloud-builders/docker@sha256:80e36415eeda32a4e2fda4c551f6cf7a450afcaa2e91bf4eafaabf942cf69bcc'
    id: docker-login-gar
    entrypoint: /bin/bash
    args:
      - '-lc'
      - |
        set -euo pipefail
        set +x
        cat /workspace/.docker-token | docker login -u oauth2accesstoken --password-stdin "https://us-central1-docker.pkg.dev"
        rm /workspace/.docker-token

  # Step 03: Register QEMU for cross-platform builds (arm64, arm/v7)
  # Builder: docker (~Feb 2026)
  # binfmt image pinned: tonistiigi/binfmt (~Feb 2026)
  - name: 'gcr.io/cloud-builders/docker@sha256:80e36415eeda32a4e2fda4c551f6cf7a450afcaa2e91bf4eafaabf942cf69bcc'
    id: qemu-binfmt
    entrypoint: /bin/bash
    args:
      - '-lc'
      - |
        set -euo pipefail
        docker run --privileged --rm \
          "docker.io/tonistiigi/binfmt@sha256:e25e3b94b42cbb4f46f2c4f84ee2f21456cc428251aeb81a6a184a0ed0364ad2" \
          --install arm64,arm

  # Step 04: Multi-arch build and export to OCI layout tarball
  # Builder: docker (~Feb 2026)
  # OCI Layout Bridge Phase 1: export to /workspace/oci-layout.tar (no push credentials needed)
  # Validates all 4 dynamic substitutions for fail-fast before expensive buildx
  - name: 'gcr.io/cloud-builders/docker@sha256:80e36415eeda32a4e2fda4c551f6cf7a450afcaa2e91bf4eafaabf942cf69bcc'
    id: build-and-export
    entrypoint: /bin/bash
    args:
      - '-lc'
      - |
        set -euo pipefail

        test -n "${_RBGY_TAG_BASE}"   || { echo "_RBGY_TAG_BASE missing"   >&2; exit 1; }
        test -n "${_RBGY_GIT_COMMIT}" || { echo "_RBGY_GIT_COMMIT missing" >&2; exit 1; }
        test -n "${_RBGY_GIT_BRANCH}" || { echo "_RBGY_GIT_BRANCH missing" >&2; exit 1; }
        test -n "${_RBGY_GIT_REPO}"   || { echo "_RBGY_GIT_REPO missing"   >&2; exit 1; }

        IMAGE_URI="us-central1-docker.pkg.dev/rbwg-d-proto-251230080456/rbw-proto-repository/rbev-busybox:${_RBGY_TAG_BASE}-image"

        docker buildx version
        docker version

        docker buildx create --driver docker-container --name rb-builder --use

        docker buildx build \
          --platform="linux/amd64,linux/arm64,linux/arm/v7" \
          --tag "$${IMAGE_URI}" \
          --output type=oci,dest=/workspace/oci-layout.tar \
          --label "moniker=rbev-busybox" \
          --label "git.commit=${_RBGY_GIT_COMMIT}" \
          --label "git.branch=${_RBGY_GIT_BRANCH}" \
          -f "rbev-vessels/rbev-busybox/Dockerfile" \
          .

  # Step 05: Push OCI layout to GAR using crane
  # Builder: alpine (~Feb 2026)
  # OCI Layout Bridge Phase 2: push from /workspace/oci-layout to registry
  - name: 'docker.io/library/alpine@sha256:59855d3dceb3ae53991193bd03301e082b2a7faa56a514b03527ae0ec2ce3a95'
    id: push-with-crane
    entrypoint: /bin/sh
    args:
      - '-c'
      - |
        set -eu

        test -f /workspace/oci-layout.tar || { echo "OCI archive not found" >&2; exit 1; }

        echo "Installing crane..."
        wget -qO- "https://github.com/google/go-containerregistry/releases/download/v0.20.7/go-containerregistry_Linux_x86_64.tar.gz" | tar xz -C /usr/local/bin crane
        crane version

        IMAGE_URI="us-central1-docker.pkg.dev/rbwg-d-proto-251230080456/rbw-proto-repository/rbev-busybox:${_RBGY_TAG_BASE}-image"

        mkdir -p /workspace/oci-layout
        tar xf /workspace/oci-layout.tar -C /workspace/oci-layout

        echo "Pushing OCI layout to $${IMAGE_URI}..."
        crane push /workspace/oci-layout "$${IMAGE_URI}" --index

        echo "$${IMAGE_URI}" > .image_uri
        echo "Done. Image available at: $${IMAGE_URI}"

  # Step 06: Generate SBOM with Syft
  # Builder: docker (~Feb 2026)
  # OCI Layout Bridge Phase 3: Syft analyzes oci-layout directly
  # syft image pinned: anchore/syft (~Feb 2026)
  - name: 'gcr.io/cloud-builders/docker@sha256:80e36415eeda32a4e2fda4c551f6cf7a450afcaa2e91bf4eafaabf942cf69bcc'
    id: sbom-and-summary
    entrypoint: /bin/bash
    args:
      - '-lc'
      - |
        set -euo pipefail

        SYFT_IMAGE="docker.io/anchore/syft@sha256:d0b19da0182bc17145379ccb3434b3f7eae540676a2b5e6bdae67152f1fae892"

        test -d /workspace/oci-layout || { echo "/workspace/oci-layout not found" >&2; exit 1; }

        echo "Generating SBOM with $${SYFT_IMAGE}..."
        docker run --rm -v /workspace:/workspace \
          "$${SYFT_IMAGE}" "oci-dir:/workspace/oci-layout" -o json  > syft_analysis.json
        docker run --rm -v /workspace:/workspace \
          "$${SYFT_IMAGE}" "oci-dir:/workspace/oci-layout" -o table > package_summary.txt

        echo "SBOM generation complete"

  # Step 07: Assemble build metadata JSON
  # Builder: alpine (~Feb 2026)
  - name: 'docker.io/library/alpine@sha256:59855d3dceb3ae53991193bd03301e082b2a7faa56a514b03527ae0ec2ce3a95'
    id: assemble-metadata
    entrypoint: /bin/sh
    args:
      - '-c'
      - |
        set -eu

        apk add --no-cache jq >/dev/null

        IMG_URI="$$(cat .image_uri)"
        cp "rbev-vessels/rbev-busybox/Dockerfile" recipe.txt
        TS="$$(date -u +%FT%TZ)"

        jq -n \
          --arg tag_base  "${_RBGY_TAG_BASE}" \
          --arg image_uri "$${IMG_URI}" \
          --arg moniker   "rbev-busybox" \
          --arg repo      "${_RBGY_GIT_REPO}" \
          --arg branch    "${_RBGY_GIT_BRANCH}" \
          --arg commit    "${_RBGY_GIT_COMMIT}" \
          --arg ts        "$${TS}" \
          --arg platforms "linux/amd64,linux/arm64,linux/arm/v7" \
          '{
            tag_base: $$tag_base,
            image: { uri: $$image_uri },
            moniker: $$moniker,
            git: { repo: $$repo, branch: $$branch, commit: $$commit },
            build: { timestamp: $$ts },
            platforms: $$platforms
          }' > build_info.json

  # Step 08: Build and push metadata container
  # Builder: docker (~Feb 2026)
  # Depends on: assemble-metadata (needs build_info.json)
  - name: 'gcr.io/cloud-builders/docker@sha256:80e36415eeda32a4e2fda4c551f6cf7a450afcaa2e91bf4eafaabf942cf69bcc'
    id: build-and-push-metadata
    entrypoint: /bin/bash
    args:
      - '-lc'
      - |
        set -euo pipefail

        META_URI="us-central1-docker.pkg.dev/rbwg-d-proto-251230080456/rbw-proto-repository/rbev-busybox:${_RBGY_TAG_BASE}-about"

        {
          echo 'FROM scratch'
          echo 'LABEL org.opencontainers.image.title="rbia-metadata"'
          echo 'ADD build_info.json /build_info.json'
          echo 'ADD syft_analysis.json /syft_analysis.json'
          echo 'ADD package_summary.txt /package_summary.txt'
          echo 'ADD recipe.txt /recipe.txt'
        } > Dockerfile.meta

        docker build -f Dockerfile.meta -t "$${META_URI}" .
        docker push "$${META_URI}"
