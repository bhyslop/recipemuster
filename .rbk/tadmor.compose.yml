#
# Tadmor nameplate compose fragment — bottle volume mounts
#
# Merged with rbob_compose.yml via: -f .rbk/rbob_compose.yml -f .rbk/tadmor.compose.yml
# Paths are relative to this file's directory (.rbk/)

services:
  bottle:
    environment:
      - DISABLE_TELEMETRY=1
      - DISABLE_ERROR_REPORTING=1
      - CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=1
    volumes:
      - ../:/project:ro
      - ../Tools/rbk/rbtid:/rbtid:rw
