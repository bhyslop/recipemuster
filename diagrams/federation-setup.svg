y="sans-serif" font-size="14" lengthAdjust="spacing" textLength="50.7637" x="854.0713" y="693.1357">(RBRD)</text></g><path d="M17,166.1875 L17,206.1875 L662,206.1875 L662,176.1875 L652,166.1875 L17,166.1875" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M652,166.1875 L652,176.1875 L662,176.1875 L652,166.1875" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="113.1216" x="116.8704" y="183.2544">Workforce pool is</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="100.7056" x="234.1243" y="183.2544">org-level only</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="23.5688" x="338.9622" y="183.2544">&#226;&#128;&#148;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="436.3188" x="116.8704" y="198.3872">a plain project cannot hold one. This is the free/paid tier boundary.</text><g class="message" data-entity-1="part1" data-entity-2="part2" id="msg1"><polygon fill="#181818" points="203.7568,228.5859,213.7568,232.5859,203.7568,236.5859,207.7568,232.5859" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="59.2241" x2="209.7568" y1="232.5859" y2="232.5859"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="132.5327" x="66.2241" y="227.52">configure federation</text></g><g class="message" data-entity-1="part2" data-entity-2="part3" id="msg2"><polygon fill="#181818" points="609.8223,257.7188,619.8223,261.7188,609.8223,265.7188,613.8223,261.7188" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="215.7568" x2="615.8223" y1="261.7188" y2="261.7188"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="102.8384" x="222.7568" y="256.6528">create org-level</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="109.6685" x="329.7275" y="256.6528">workforce pool</text></g><g class="message" data-entity-1="part2" data-entity-2="part3" id="msg3"><polygon fill="#181818" points="609.8223,301.9844,619.8223,305.9844,609.8223,309.9844,613.8223,305.9844" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="215.7568" x2="615.8223" y1="305.9844" y2="305.9844"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="41.5518" x="222.7568" y="285.7856">create</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="62.1118" x="268.4409" y="285.7856">provider</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="47.8867" x="334.6851" y="285.7856">in pool,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="233.1748" x="222.7568" y="300.9185">trust external IdP (OIDC / SAML 2.0)</text></g><g class="message" data-entity-1="part2" data-entity-2="part3" id="msg4"><polygon fill="#181818" points="609.8223,346.25,619.8223,350.25,609.8223,354.25,613.8223,350.25" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="215.7568" x2="615.8223" y1="350.25" y2="350.25"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="19.8682" x="222.7568" y="330.0513">set</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="134.1323" x="246.7573" y="330.0513">attribute mapping</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="382.0654" x="222.7568" y="345.1841">google.subject &lt;- immutable IdP claim (sub/oid, &lt;=127 B)</text></g><path d="M626,363.25 L626,388.25 L871,388.25 L871,373.25 L861,363.25 L626,363.25" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M861,363.25 L861,373.25 L871,373.25 L861,363.25" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="224.9609" x="632" y="380.3169">a *mutable* claim invites spoofing</text><g class="message" data-entity-1="part2" data-entity-2="part3" id="msg5"><polygon fill="#181818" points="609.8223,425.6484,619.8223,429.6484,609.8223,433.6484,613.8223,429.6484" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="215.7568" x2="615.8223" y1="429.6484" y2="429.6484"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="288.8945" x="222.7568" y="409.4497">grant depot capability to federated principal</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="336.1211" x="222.7568" y="424.5825">principal://.../workforcePools/POOL/subject/SUBJECT</text></g><g class="message" data-entity-1="part1" data-entity-2="part5" id="msg6"><polygon fill="#181818" points="867.4531,469.9141,877.4531,473.9141,867.4531,477.9141,871.4531,473.9141" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="59.2241" x2="873.4531" y1="473.9141" y2="473.9141"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="169.9077" x="66.2241" y="453.7153">inscribe mode=federation</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="274.168" x="66.2241" y="468.8481">+ org-wide facts: pool, provider, audience</text></g><path d="M884,486.9141 L884,526.9141 L1202,526.9141 L1202,496.9141 L1192,486.9141 L884,486.9141" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1192,486.9141 L1192,496.9141 L1202,496.9141 L1192,486.9141" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="209.3647" x="890" y="503.981">tripwire-protected (rbw-rdc) &#226;&#128;&#148;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="297.2861" x="890" y="519.1138">mode is tamper-evident, one mode per depot</text><path d="M5,537.1797 L5,592.1797 L799,592.1797 L799,547.1797 L789,537.1797 L5,537.1797" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M789,537.1797 L789,547.1797 L799,547.1797 L789,537.1797" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="265.3257" x="210.895" y="554.2466">Identity proofing lives entirely in the IdP.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="373.5723" x="210.895" y="569.3794">RBK only grants capability to an already-known principal;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="350.7144" x="210.895" y="584.5122">the depot remains home of the role-to-identity roster.</text><path d="M169,602.5781 L169,642.5781 L668,642.5781 L668,612.5781 L658,602.5781 L169,602.5781" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M658,602.5781 L658,612.5781 L668,612.5781 L658,602.5781" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="145.1201" x="260.0198" y="619.645">gcloud / REST touches</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="76.9717" x="409.2722" y="619.645">setup only</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="195.9585" x="260.0198" y="634.7778">(pool &amp; provider creation) &#226;&#128;&#148;</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="104.2539" x="460.1106" y="634.7778">never runtime</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="564.3645" y="634.7778">.</text><?plantuml-src TLJHRjem57tFLrprOQ8UIJgahH9R9vN2fcwjG40rJSgBYI_1gsD7ZWFZRH-nBzYdT3-swoH0OPl40ufzppttd7Fjf5C87r2WvKuQ3NE95dx_Ulhnz1DcwAe2EaPZw6IENPZmhR5XAGL23CPcm4KkzNcYPwQoAVOXnzo4lOlUculNlSlG51wLAb9B3RIJN8Mv4QZAA1T1m5CwWxCQDD6T0zuPy18crr_7qw3WribK5bmxECjIPIf1hQUZsPmgofgVqMhRbCn6yuV9SSd7cmdSNjytyA72DQhcBdqylZdwxj1ghk1MJEZw-7PuGvrcr_Ttq8iksgBX2VmG2-F0OaRoKD5qC1qsD_s_8D368PWrALfFq_LTeGzVZ7rS6X8C2cCKo18OszEhvs6izI3H70h5fOR2cc-OEaYv9bXO6INeAaOmNn40_TmAOMaHuu9B0Sxxk32L5jnkeo2e2K3ulX69IAH6BsLMMIhQknyqXtIh8Kg-SJ_1dXjZcoFkZFsdX37YkwQWM1h5iwVBtKGxMvKEy9dKy9VIfuZaCi5nvwnSL0ITywAGEcCiqPancSAeh1QrDEz2a7bUERwWJ7lib9JBeKFdiP6Y2--kNlKkON3U66Dbjd9WbcqV3gojPMsXr6lfi8IIs2-fvIcppFeGY3e3AI_uGYhfjk3CJb8KP9lKFYqgqVk__JYEeYZUIpaXSSfuCXxVnUqeyUnXy6bqCt_ccqyKzPIwJ4a8ae4MwUfWNQ9VrZvj_78kQRNAVYCwx8pe0g-4H9tYoVWjCkbRRAJ5a0eSSI3o7RlOX5Qav_iq-gvrs7XEonsYHzQkwvDOCmBwsYZoh_GFVV1kwwU0TA8-jQoWv9fKzbyjggsFYyyo6HWbUZhuN6z48tPveZFNm1KbJcp3Hsqs-Y3tMmeRWOXsGNDQePAM9aS_iJ-nHj6pPaAvesDDIR6Cdj6kxTujxT7ZGxshT8L-SG-Fa4zafzxe5tlHctqWVtOIKeL63suhxHzLngBW3m00?></g></svg>