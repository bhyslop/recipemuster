e-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="362.1401" x="11" y="569.6216">Enabling refactor (shippable now, no behavior change):</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="325.1206" x="11" y="584.7544">collapse ~30 file-path-keyed call sites behind one</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="425.2676" x="11" y="599.8872">identity-keyed accessor. Then federation is just a second branch.</text><?plantuml-src TLHHRzem47xFhpZnCa04TLJhkcYjH4E7cAQ12jAa2MaoyOLuJUp8Db3siD--EmCDQDiBEBwxpzzt_ivU-H9XKI3CbLxJCZMIrYWgYC5e195bw9onFQWuWdfJmSeAdHNeG6cd92xrt6niXWbKM9buS3MukNetU1-R6gtmniQPHOdQAr7635AwVYMXNQ3myF0TdBURp6-iAA4MUvFddIYgXVKgKxNG7bgfqMvJeLtgjj1x6ASpo4HPWbCUEoqG3jBfr_bbpS8yeuRXaJnLUfB8UXnBo_MXRfYcaHHUh8H3Q3qzF0tX6VUGgn93d7SkSSV6S9UcmuqlGifuEXrVfZo-UBIQr4paBAHCHhD_WimNyn2d_ylu26lZOJYR46zIU-1AYoXYeH3VCt58mBF8jWgzzNkuWvPK5ZDgUOjwA4f_TcTtTooDbG6qBGe9kJKLAnnr8WY0X1jQa815PyejmYiqXUQXDqqg2wTKfzOQPVpvsmBm9Ik4NYFbX63yIlHWeX-1RqJtZvV4Sh87EKKPtS1JqwZm2wxXBJbHubPb27bfTj1--fJ2xStWbdbpMdFET39AQUlGc0QB6dp46X0MVuM4-4Ju1FdXcY4v_Z_gMaPH0ALuk8i4kjsLi7YHnvQcQUfscmjZqoR0hZ5M_GfQ4tX0ghJmyRpsFkBKCtmPp40tKjCOO1Hfuyd9MwhZXDuHUMHscavbSoj7dCASnQjIQTdjacYaWdqpDY2aTCVpUqlzhCtE0I4NH1jC3ZmjWSuR1qHuhNJ_huCF_NdKWazP4yDSiFMWxGfLrxIBXBZhqG-ii11RHR53lpl9KcUcB4LDJlXzVHK6Bgw5BsAo6Cg6f-DIqi2ZkzGdEnwpJazJdzylVUOYRi7FZVCWQDmpG-M75wiV_G40?></g></svg>